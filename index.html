<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Room Dashboard</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Smart Room Dashboard</h1>
    <p class="subtitle">Live ESP32 room monitoring</p>

    <div class="dashboard">
      <div class="card">
        <h2>Temperature</h2>
        <p id="temperature">-- °C</p>
      </div>

      <div class="card">
        <h2>Humidity</h2>
        <p id="humidity">-- %</p>
      </div>

      <div class="card">
        <h2>Device</h2>
        <p id="device">--</p>
      </div>

      <div class="card">
        <h2>Last Update</h2>
        <p id="timestamp">--</p>
      </div>

      <div class="card full-width">
        <h2>Status</h2>
        <p id="status">Waiting for data...</p>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
